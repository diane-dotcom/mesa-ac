<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="services-page">
    <header class="site-header" id="top">
      <a class="brand" href="#top" aria-label="Mesa home">
        <img class="brand-logo" src="assets/mesa_logo_transparent.png" alt="Mesa Plumbing and Sewer Company Boulder" />

      <button class="menu-button" type="button" aria-label="Open menu" aria-expanded="false">

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="services.html">Services</a>
        <a href="locations.html">Locations</a>

      <div class="header-actions">

    <div id="homepage-footer-clone"></div>

          const main = source.querySelector('main');
          const footer = source.querySelector('footer');

            const whySection = clonedMain.querySelector('#about');
            const faqSection = clonedMain.querySelector('#areas');
            const serviceDivider = clonedMain.querySelector('.section-divider');
            const contactSection = clonedMain.querySelector('#contact');
            const reviewsSection = clonedMain.querySelector('#reviews');
            const reviewDivider = clonedMain.querySelector('.why-review-divider');
            const contactDivider = clonedMain.querySelector('.contact-location-divider');
            const locationsSection = clonedMain.querySelector('#locations');

            topReviewStrip?.remove();
            servicesSection?.remove();
            whySection?.remove();
            faqSection?.remove();

                  <button type="button" data-location="broomfield"><i data-lucide="map-pin"></i> Broomfield</button>

              servicesSection.className = 'section services service-section-reference';

                        <a href="#request" data-service="Pipe Repair">View Pipe Repair <i data-lucide="arrow-right"></i></a>
                      </div>
                    </article>
                    <article class="service-page-card" id="emergency-plumbing">
                      <div class="service-page-photo service-photo-emergency"></div>
                      <div class="service-page-body">
                        <div class="service-page-title"><i data-lucide="siren"></i><h3>Emergency Plumbing</h3></div>
                        <p>24/7 response for urgent leaks, backups, clogs, and pipe issues.</p>
                        <ul><li>Burst pipes and leaks</li><li>Backups and urgent clogs</li><li>Fast scheduling when available</li></ul>
                        <a href="tel:+17206802303">Get Emergency Help <i data-lucide="arrow-right"></i></a>
                      </div>
                    </article>
                  </div>
                </div>
              `;
              const divider = servicesSection.nextElementSibling;
              if (divider?.classList.contains('section-divider')) {
                divider.className = 'service-core-divider';
                divider.innerHTML = '<span></span><i data-lucide="wrench"></i><span></span>';
              }
            }
            if (locationsSection) {
              locationsSection.insertAdjacentHTML('beforebegin', '<span id="request" class="anchor-offset"></span><span id="contact" class="anchor-offset"></span>');
              locationsSection.className = 'section locations-section service-location-section';
              locationsSection.innerHTML = `
                <div class="locations-shell">
                  <div class="locations-heading">
                    <p class="section-kicker">Locations Near You</p>
                    <h2>Boulder Plumbing &amp; Sewer Locations Near You</h2>
                    <p>Choose a nearby Mesa location to see service details, response notes, and the map.</p>
                  </div>
                  <div class="locations-grid">
                    <div class="location-list" aria-label="Service locations">
                      <button class="location-button is-active" type="button" data-location-button data-location="mesa-main"><i data-lucide="map-pin"></i><span><strong>Mesa Plumbing</strong><small>1740 38th Street Boulder, CO</small></span></button>
                      <button class="location-button" type="button" data-location-button data-location="mesa-drain-one"><i data-lucide="map-pin"></i><span><strong>Mesa Drain Cleaning</strong><small>6260 Lookout Road #201 Boulder, CO</small></span></button>
                      <button class="location-button" type="button" data-location-button data-location="mesa-drain-two"><i data-lucide="map-pin"></i><span><strong>Mesa Sewer Repair</strong><small>3050 Broadway Ste 311 Boulder, CO</small></span></button>
                      <button class="location-button" type="button" data-location-button data-location="mcadams"><i data-lucide="map-pin"></i><span><strong>McAdams Plumbing</strong><small>6343 W 120th Avenue Suite 101 Broomfield, CO</small></span></button>

                    <div class="location-map" aria-label="Mesa Plumbing map"><iframe data-location-map src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3055.6148246577477!2d-105.245935023455!3d40.01705047986744!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876bf1cc19a1865d%3A0xc9ce44cbcc130f0a!2sMesa%20Plumbing%2C%20Heating%20and%20Cooling!5e0!3m2!1sen!2sph!4v1781731090707!5m2!1sen!2sph" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
                    <aside class="location-details" aria-live="polite">
                      <span class="location-details-label">Selected Location</span>
                      <h3 data-location-title>Mesa Plumbing</h3>
                      <p data-location-copy>1740 38th Street Boulder, CO. Mesa serves local plumbing, sewer, drain, water heater, and emergency service needs from this Boulder-area location.</p>
                      <div class="location-detail-list">
                        <span><i data-lucide="clock-3"></i><strong data-location-response>Same-day appointments available</strong></span>
                        <span><i data-lucide="wrench"></i><strong data-location-services>Plumbing, sewer, drains, water heaters</strong></span>
                        <span><i data-lucide="external-link"></i><strong><a data-location-link href="https://www.google.com/search?q=Mesa+Plumbing,+Heating+and+Cooling&stick=H4sIAAAAAAAA_-NgU1I1qLAwN0tKM0xONrRMNLQwM02xMqhItkxONTFJTgIKGhukGSQuYlXyTS1OVAjIKc1NysxL11HwSE0sATIUEvNSFJzz83OAbACPp1A4TgAAAA&hl=en&mat=CYEs_6XAdIs2ElcBa0lj_2hYosnL0kKF4aUrOm20SEOoZ3bRoD_fsaEW-FpXYQxSCMNUreyTY4LnwXaINVrLonftcb8tlUEJ25rz-Yrmpfy9DINMMN2ypvXlPOzbci196nk&authuser=0" target="_blank" rel="noreferrer">Open Location Map</a></strong></span>
                        <span><i data-lucide="phone"></i><strong><a href="tel:+17206802303">Call (720) 680-2303</a></strong></span>
                      </div>
                      <a class="button button-red" href="tel:+17206802303">Schedule Service <i data-lucide="arrow-right"></i></a>
                    </aside>
                  </div>
                </div>
              `;
            }
            document.querySelector('#homepage-clone').replaceWith(clonedMain);
          }
          if (footer) document.querySelector('#homepage-footer-clone').replaceWith(footer.cloneNode(true));
          if (window.lucide) window.lucide.createIcons({ attrs: { 'aria-hidden': 'true' } });
          document.dispatchEvent(new Event('mesa:content-loaded'));
          const hashMap = {
            '#plumbing-repair': '#plumbing',
            '#sewer-drain': '#sewer',
            '#water-heater-service': '#water-heaters',
            '#emergency-plumbing': '#request',
          };
          const target = document.querySelector(hashMap[window.location.hash] || window.location.hash);
          target?.scrollIntoView();
        });
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
