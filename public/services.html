          breadcrumb: 'Home / Services',

            { icon: 'flame', title: 'Professional Boiler Repair', copy: 'Heating system help from experienced local technicians.' },
            { icon: 'thermometer-sun', title: 'Expert HVAC Help', copy: 'Reliable heating and cooling service for year-round comfort.' },
            { icon: 'waves', title: 'Fix Your Drain & Sewer', copy: 'Drain cleaning, sewer repair, and backup solutions done right.' },
          ],
          kicker: 'Our Services',
          sectionTitle: 'Explore More Mesa Services',
          sectionCopy: 'One trusted team for drain cleaning, sewer line repair, water heaters, AC repair, and furnace repair across Boulder County.',
          cards: relatedServiceCards('plumbing-repair'),
        },
        'drain-cleaning': {

          kicker: 'Drain Cleaning',
          sectionTitle: 'Explore More Mesa Services',
          sectionCopy: 'One trusted local team for plumbing service, sewer line repair, water heaters, AC repair, and furnace repair across Boulder County.',
          cards: relatedServiceCards('drain-cleaning'),
        },
        'sewer-line-repair': {
          title: 'Sewer Line Repair Boulder | Mesa Plumbing & Sewer',
          description: 'Sewer line repair in Boulder for sewer backups, damaged sewer lines, camera inspections, and replacement support.',
          breadcrumb: 'Home / Services / Sewer Line Repair',
          eyebrow: 'Sewer backup and line repair help',

          copy: 'From sewer backups to damaged underground lines, Mesa helps Boulder homeowners understand the issue and choose the right repair path.',

          sectionTitle: 'Explore More Mesa Services',
          sectionCopy: 'One trusted local team for plumbing service, drain cleaning, water heaters, AC repair, and furnace repair across Boulder County.',

        },
        'water-heaters': {

          description: 'Water heater repair and replacement in Boulder for tank, tankless, no-hot-water, and maintenance needs.',
          breadcrumb: 'Home / Services / Water Heaters',
          eyebrow: 'Hot water repair and replacement',
          heading: 'Water Heater Service <span>Done Right.</span>',
          copy: 'Mesa helps with no-hot-water calls, leaking tanks, replacement planning, and routine water heater service for Boulder homes.',
          kicker: 'Water Heaters',
          sectionTitle: 'Explore More Mesa Services',
          sectionCopy: 'One trusted local team for plumbing service, drain cleaning, sewer line repair, AC repair, and furnace repair across Boulder County.',
          cards: relatedServiceCards('water-heater-service'),

        'ac-repair': {
          title: 'AC Repair Boulder | Mesa Plumbing Heating & Cooling',
          description: 'AC repair in Boulder for cooling diagnostics, air conditioner repairs, seasonal tune-ups, and comfort troubleshooting.',
          breadcrumb: 'Home / Services / AC Repair',
          eyebrow: 'Cooling repair and comfort help',
          heading: 'AC Repair <span>Done Right.</span>',
          copy: 'When your home is not cooling the way it should, Mesa provides practical AC diagnostics, repair support, and tune-ups for Boulder homeowners.',

          sectionTitle: 'Explore More Mesa Services',
          sectionCopy: 'One trusted local team for plumbing service, drain cleaning, sewer line repair, water heaters, and furnace repair across Boulder County.',

          cards: relatedServiceCards('furnace-repair'),
        },
      };

        const serviceParam = new URLSearchParams(window.location.search).get('service');
        if (serviceParam && servicePages[serviceParam]) return servicePages[serviceParam];
        const slug = (window.location.pathname.split('/').filter(Boolean).pop() || 'services').replace(/\.html$/, '');
        return servicePages[slug] || servicePages.services;
      };

      const escapeAttr = (value) => String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      const renderHighlight = (highlight) => `
        <div class="service-hero-highlight">
          <i data-lucide="${escapeAttr(highlight.icon)}"></i>
          <span><strong>${highlight.title}</strong><small>${highlight.copy}</small></span>
        </div>
      `;
      const renderCard = (card) => `
        <article class="service-page-card" id="${escapeAttr(card.id)}">
          <div class="service-page-photo ${escapeAttr(card.photo)}"></div>
          <div class="service-page-body">
            <div class="service-page-title"><i data-lucide="${escapeAttr(card.icon)}"></i><h3>${card.title}</h3></div>
            <p>${card.copy}</p>
            <ul>${card.bullets.map((bullet) => `<li>${bullet}</li>`).join('')}</ul>
            <a href="${escapeAttr(card.href)}" data-service="${escapeAttr(card.service)}">${card.action} <i data-lucide="arrow-right"></i></a>
          </div>
        </article>
      `;

      const currentPage = getServicePage();
      document.title = currentPage.title;
      document.querySelector('meta[name="description"]')?.setAttribute('content', currentPage.description);

      fetch('/index.html')
        .then((response) => response.text())
        .then((html) => {
          const source = new DOMParser().parseFromString(html, 'text/html');
          const main = source.querySelector('main');
          const footer = source.querySelector('footer');
          if (main) {
            const clonedMain = main.cloneNode(true);
            const hero = clonedMain.querySelector('.hero');
            const heroImage = hero?.querySelector('.hero-bg-photo');
            const heroForm = hero?.querySelector('.request-card');
            const heroServiceButtons = hero?.querySelector('.hero-service-highlights');
            const heroContent = hero?.querySelector('.hero-content');
            const servicesSection = clonedMain.querySelector('#services');
            const contactSection = clonedMain.querySelector('#contact');
            const reviewsSection = clonedMain.querySelector('#reviews');
            const reviewDivider = clonedMain.querySelector('.why-review-divider');
            const contactDivider = clonedMain.querySelector('.contact-location-divider');
            const locationsSection = clonedMain.querySelector('#locations');
            const whySection = clonedMain.querySelector('.why-choose');

            if (whySection) {
              const whyKicker = whySection.querySelector('.section-kicker');
              const whyHeading = whySection.querySelector('h2');
              const whyImage = whySection.querySelector('.why-photo-card img');
              if (whyKicker) whyKicker.textContent = 'Locally Run, Not Private Equity';
              if (whyHeading) whyHeading.textContent = 'Locally Run, Not Private Equity';
              if (whyImage) {
                whyImage.src = 'assets/mesa-locally-new.png';
                whyImage.alt = 'Mesa local service team with vans in Boulder County';
              }
            }

            hero?.classList.add('service-hero-reference');
            if (heroImage) heroImage.src = 'assets/mesa-hero-van.png';
            heroForm?.remove();
            heroServiceButtons?.remove();
            reviewDivider?.remove();
            reviewsSection?.remove();
            contactSection?.remove();
            contactDivider?.remove();
            if (heroContent) {
              heroContent.innerHTML = `
                <p class="breadcrumb">${currentPage.breadcrumb}</p>
                <p class="eyebrow">${currentPage.eyebrow}</p>
                <h1>${currentPage.heading}</h1>
                <p class="hero-copy">${currentPage.copy}</p>
                <div class="hero-buttons">
                  <a class="button button-red" href="tel:+17206802303"><i data-lucide="phone"></i> Call (720) 680-2303</a>
                  <a class="button button-dark" href="locations.html">View Service Area <i data-lucide="arrow-right"></i></a>
                </div>
                ${currentPage.highlights ? `<div class="service-hero-highlights" aria-label="Featured services">${currentPage.highlights.map(renderHighlight).join('')}</div>` : ''}
              `;
            }
            if (servicesSection) {
              servicesSection.className = 'section services service-section-reference';
              servicesSection.innerHTML = `
                <div class="services-page-shell">
                  <div class="section-heading">
                    <p class="section-kicker">${currentPage.kicker}</p>
                    <h2>${currentPage.sectionTitle}</h2>
                    <p>${currentPage.sectionCopy}</p>
                  </div>
                  <div class="service-page-grid${currentPage.cards.length === 5 ? ' is-five-card-grid' : ''}">
                    ${currentPage.cards.map(renderCard).join('')}
                  </div>
                </div>
              `;
              const divider = servicesSection.nextElementSibling;
              if (divider?.classList.contains('section-divider')) {
                divider.className = 'service-core-divider';
                divider.innerHTML = '<span></span><i data-lucide="wrench"></i><span></span>';
              }
            }
            if (locationsSection) {
              locationsSection.insertAdjacentHTML('beforebegin', '<span id="request" class="anchor-offset"></span><span id="contact" class="anchor-offset"></span>');
              locationsSection.className = 'section locations-section service-location-section';
              locationsSection.innerHTML = `
                <div class="locations-shell">
                  <div class="locations-heading">
                    <p class="section-kicker">Locations Near You</p>
                    <h2>Boulder Plumbing &amp; Sewer Locations Near You</h2>
                    <p>Choose a nearby Mesa location to see service details, response notes, and the map.</p>
                  </div>

                  <div class="locations-grid">
                    <div class="location-list" aria-label="Service locations">
                      <button class="location-button is-active" type="button" data-location-button data-location="mesa-main">
                        <i data-lucide="map-pin"></i>
                        <span><strong>Mesa Plumbing</strong><small>1740 38th Street Boulder, CO</small></span>
                      </button>
                      <button class="location-button" type="button" data-location-button data-location="mesa-drain-one">
                        <i data-lucide="map-pin"></i>
                        <span><strong>Mesa Drain Cleaning</strong><small>6260 Lookout Road #201 Boulder, CO</small></span>
                      </button>
                      <button class="location-button" type="button" data-location-button data-location="mesa-drain-two">
                        <i data-lucide="map-pin"></i>
                        <span><strong>Mesa Sewer Repair</strong><small>3050 Broadway Ste 311 Boulder, CO</small></span>
                      </button>
                      <button class="location-button" type="button" data-location-button data-location="mcadams">
                        <i data-lucide="map-pin"></i>
                        <span><strong>McAdams Plumbing</strong><small>6343 W 120th Avenue Suite 101 Broomfield, CO</small></span>
                      </button>

                    <div class="location-map" aria-label="Boulder service area map">

                      <p data-location-copy>1740 38th Street Boulder, CO. Mesa serves local plumbing, sewer, drain, water heater, and emergency service needs from this Boulder-area location.</p>

                        <span><i data-lucide="clock-3"></i><strong data-location-response>Same-day appointments available</strong></span>
                        <span><i data-lucide="wrench"></i><strong data-location-services>Plumbing, sewer, drains, water heaters</strong></span>
                        <span><i data-lucide="external-link"></i><strong><a data-location-link href="https://www.google.com/search?q=Mesa+Plumbing,+Heating+and+Cooling&stick=H4sIAAAAAAAA_-NgU1I1qLAwN0tKM0xONrRMNLQwM02xMqhItkxONTFJTgIKGhukGSQuYlXyTS1OVAjIKc1NysxL11HwSE0sATIUEvNSFJzz83OAbACPp1A4TgAAAA&hl=en&mat=CYEs_6XAdIs2ElcBa0lj_2hYosnL0kKF4aUrOm20SEOoZ3bRoD_fsaEW-FpXYQxSCMNUreyTY4LnwXaINVrLonftcb8tlUEJ25rz-Yrmpfy9DINMMN2ypvXlPOzbci196nk&authuser=0" target="_blank" rel="noreferrer">Open Location Map</a></strong></span>
                        <span><i data-lucide="phone"></i><strong><a href="tel:+17206802303">Call (720) 680-2303</a></strong></span>
                      </div>
                      <a class="button button-red" href="tel:+17206802303">Schedule Service <i data-lucide="arrow-right"></i></a>
                    </aside>
                  </div>
                </div>
              `;
            }
            document.querySelector('#homepage-clone').replaceWith(clonedMain);
          }
          if (footer) document.querySelector('#homepage-footer-clone').replaceWith(footer.cloneNode(true));
          if (window.lucide) window.lucide.createIcons({ attrs: { 'aria-hidden': 'true' } });
          document.dispatchEvent(new Event('mesa:content-loaded'));
          const hashMap = {
            '#plumbing-repair': '#plumbing',
            '#sewer-drain': '#sewer',
            '#water-heater-service': '#water-heaters',
            '#emergency-plumbing': '#request',
          };
          const target = document.querySelector(hashMap[window.location.hash] || window.location.hash);
          target?.scrollIntoView();
        });
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
